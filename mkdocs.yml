site_name: Unified AI Control Catalog
site_description: Assessor-oriented AI governance controls, evidence expectations, confidence-labeled crosswalks, and governance-as-code artifacts.
site_url: https://docs.uacc.dev/
repo_url: https://github.com/codeugox/unified-ai-control-catalog
repo_name: codeugox/unified-ai-control-catalog
edit_uri: edit/main/docs/
copyright: >
  UACC is an open working reference catalog. It does not provide legal advice,
  certify compliance, or create a regulatory safe harbor.

theme:
  name: material
  # logo: assets/logo.svg
  # favicon: assets/favicon.png
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - social

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Control Index: control-index.md
  - Control Catalog: control-catalog.md
  - Methodology: methodology.md
  - Evidence Templates: evidence-templates.md
  - Crosswalk: crosswalk.md
  - Governance as Code: governance-as-code.md
  - GenAI Overlay: genai-overlay.md
  - Glossary: glossary.md
